name: Multi-Variant Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [light, advanced, premium]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # On retire complètement setup-node pour éviter tout conflit
      - name: Install Dependencies
        run: npm install --legacy-peer-deps --force

      - name: Export Web Bundle
        run: npm run export:${{ matrix.variant }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          netlify-config-path: ./netlify.toml
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ 
            matrix.variant == 'light' && secrets.NETLIFY_SITE_ID_LIGHT || 
            matrix.variant == 'advanced' && secrets.NETLIFY_SITE_ID_ADVANCED || 
            secrets.NETLIFY_SITE_ID_PREMIUM 
            }}
